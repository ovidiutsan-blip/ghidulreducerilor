name: 🔗 Verificare Linkuri Afiliate

on:
  schedule:
    # 20:00 UTC = 22:00 România — după raport zilnic
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mod verificare'
        required: false
        default: 'quick'
        type: choice
        options:
          - quick
          - full
      remove_dead:
        description: 'Sterge deal-urile moarte din deals.json'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  link-check:
    name: Link Checker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalare dependențe
        run: pip install -r requirements.txt

      - name: 📁 Creare directoare
        run: mkdir -p logs

      - name: 🔍 Verificare linkuri
        run: |
          MODE="${{ github.event.inputs.mode || 'quick' }}"
          REMOVE="${{ github.event.inputs.remove_dead || 'true' }}"
          ARGS="--mode $MODE"
          if [ "$REMOVE" = "true" ]; then ARGS="$ARGS --remove-dead"; fi
          python scripts/link_checker.py $ARGS

      - name: 💾 Commit deals actualizate
        run: |
          git config user.name "GhidulReducerilor Bot"
          git config user.email "bot@ghidulreducerilor.ro"
          git add data/deals.json
          git diff --staged --quiet || git commit -m "🔗 Link check $(date +%Y-%m-%d) — dead links removed"

      - name: 📤 Push
        run: git push
